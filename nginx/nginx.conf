events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream engine {
        server engine:8000;
    }

    server {
        listen 80;
        server_name _;

        # API -> FastAPI engine. Tuned for Server-Sent Events (Day 3 live stream).
        location /api/ {
            proxy_pass         http://engine/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection '';
            proxy_buffering    off;        # required for SSE
            proxy_cache        off;
            proxy_read_timeout 3600s;      # keep long-lived streams open
        }

        # Static Next.js export (built to ./web/out, mounted by docker-compose).
        location / {
            root      /usr/share/nginx/html;
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}
