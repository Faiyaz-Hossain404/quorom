# Quorum stack. The `engine` service is the mandatory "backend on Alibaba Cloud"
# proof; `nginx` fronts it and serves the static Next.js export.
services:
  engine:
    build: ./engine
    env_file: .env
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/out:/usr/share/nginx/html:ro   # build web first: cd web && npm ci && npm run build
    depends_on:
      - engine
    restart: unless-stopped
